# Job search configuration
# Add more queries, locations, or platforms as needed

queries:
  - title: "DevOps Engineer"
    locations:
      - "Lahore"
    experience_max_years: 3
    remote_ok: true

  # Uncomment to add more search queries:
  # - title: "Site Reliability Engineer"
