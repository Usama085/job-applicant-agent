platforms:
  linkedin:
    base_search_url: "https://www.linkedin.com/jobs/search/"
    sort_by: "date"
    time_filter: "r86400"       # Past 24 hours
    easy_apply_only: false      # false = also attempt external links

  indeed:
    base_search_url: "https://pk.indeed.com/jobs"
    sort_by: "date"
    date_posted: "1"            # Last 24 hours
